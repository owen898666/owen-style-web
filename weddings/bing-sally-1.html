<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>婚禮作品 — Owen Style</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .gallery-container { padding: 40px 0; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .photo-item { aspect-ratio: 3/2; background: #f5f0e8; border-radius: 8px; overflow: hidden; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }
    .loading, .error { text-align: center; padding: 80px 20px; }
    .error { color: #c44; }
    .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent); }
  </style>
</head>
<body>
  <nav class="nav"><a href="../index.html" class="nav-logo">OWEN</a></nav>
  <div class="container gallery-container">
    <a href="../service-wedding.html" class="back-link">← 返回</a>
    <h1 id="album-title">載入中...</h1>
    <p id="album-meta"></p>
    <div id="photo-grid"><div class="loading">載入中...</div></div>
  </div>
  <script>
    var htmlFile = window.location.pathname.split('/').pop();
    var debug = document.getElementById('album-meta');
    debug.textContent = '載入: ' + htmlFile;
    
    fetch('/owen-style-web/weddings/wedding-photos.json')
      .then(function(r) { 
        debug.textContent += ' | HTTP ' + r.status;
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json(); 
      })
      .then(function(data) {
        var album = data[htmlFile];
        if (!album) {
          document.getElementById('photo-grid').innerHTML = '<div class="error">找不到相簿</div>';
          return;
        }
        document.getElementById('album-title').textContent = album.title || '婚禮';
        var photos = album.photos || [];
        document.getElementById('album-meta').textContent = photos.length + ' 張照片';
        
        var html = '';
        for (var i = 0; i < photos.length; i++) {
          var p = photos[i];
          var src = p.thumb || p.medium || '';
          if (src) {
            html += '<div class="photo-item"><img src="' + src + '" alt="" loading="lazy"></div>';
          }
        }
        document.getElementById('photo-grid').innerHTML = html || '<div class="error">無照片</div>';
      })
      .catch(function(err) {
        document.getElementById('photo-grid').innerHTML = '<div class="error">載入失敗: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
