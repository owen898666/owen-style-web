[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  force = true
  from = "/index"
  to = "/index.html"
  status = 301

[[redirects]]
  force = true
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  force = false
  from = "/*"
  to = "/index.html"
  status = 404
